name: Keep Vercel App Alive

on:
  schedule:
    # 10분마다 실행 (Vercel 무료 서버가 수면 모드로 들어가는 것을 방지)
    - cron: "*/10 * * * *"
  # 수동으로 실행할 수 있는 옵션
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Website
        run: |
          echo "Pinging gahyo.co.kr to keep the server alive..."
          curl -s -o /dev/null -w "%{http_code}" https://gahyo.co.kr
